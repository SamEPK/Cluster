---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: {{ .Release.Namespace }}
data:
  FLASK_ENV: {{ .Values.backend.env.flaskEnv | quote }}
  PORT: {{ .Values.backend.port | quote }}
  LOG_LEVEL: {{ .Values.backend.env.logLevel | quote }}
  FRONTEND_URL: "https://{{ .Values.global.domain }}"
  CORS_ORIGINS: "https://{{ .Values.global.domain }}"
  SEED_DB: {{ .Values.backend.env.seedDb | quote }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads
  namespace: {{ .Release.Namespace }}
  labels:
    app: backend
spec:
  accessModes: ["ReadWriteMany"]
  storageClassName: {{ .Values.global.storageClass }}
  resources:
    requests:
      storage: {{ .Values.backend.uploadsStorage }}
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: {{ .Release.Namespace }}
  labels:
    app: backend
spec:
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
  selector:
    app: backend
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lottoti.labels" . | nindent 4 }}
    app: backend
    tier: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        tier: backend
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: backend
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-for-db
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - 'until pg_isready -h postgres -p 5432 -U {{ .Values.postgres.user }}; do sleep 2; done'
        - name: wait-for-redis
          image: redis:7-alpine
          command:
            - sh
            - -c
            - 'until redis-cli -h redis ping | grep -q PONG; do sleep 2; done'
      containers:
        - name: api
          image: {{ include "lottoti.image" (dict "ctx" . "repository" .Values.backend.image.repository "tag" .Values.backend.image.tag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lottoti-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgres.user }}:$(POSTGRES_PASSWORD)@postgres:5432/{{ .Values.postgres.database }}"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
            - name: FLASK_SECRET_KEY
              valueFrom: {secretKeyRef: {name: lottoti-secrets, key: FLASK_SECRET_KEY}}
            - name: JWT_SECRET_KEY
              valueFrom: {secretKeyRef: {name: lottoti-secrets, key: JWT_SECRET_KEY}}
            - name: STRIPE_SECRET_KEY
              valueFrom: {secretKeyRef: {name: lottoti-secrets, key: STRIPE_SECRET_KEY}}
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom: {secretKeyRef: {name: lottoti-secrets, key: STRIPE_WEBHOOK_SECRET}}
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.port }}
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads
{{- if .Values.backend.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend
  namespace: {{ .Release.Namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: {{ .Values.backend.hpa.minReplicas }}
  maxReplicas: {{ .Values.backend.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.backend.hpa.targetCPU }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.backend.hpa.targetMemory }}
{{- end }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend
  namespace: {{ .Release.Namespace }}
spec:
  minAvailable: {{ .Values.backend.pdb.minAvailable }}
  selector:
    matchLabels:
      app: backend
