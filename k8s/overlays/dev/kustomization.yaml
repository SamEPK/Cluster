apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Overlay DEV: replicas reduits, NetworkPolicies relachees, ressources allegees.
resources:
  - ../../base

commonAnnotations:
  lottoti.io/environment: development

images:
  - name: lottoti/backend
    newTag: dev
  - name: lottoti/frontend
    newTag: dev

patches:
  # Reduire les replicas en dev
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  # Disable HPA en dev
  - target:
      kind: HorizontalPodAutoscaler
      name: backend
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 2
  - target:
      kind: HorizontalPodAutoscaler
      name: frontend
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 2
